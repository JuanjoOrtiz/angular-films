<div class="row">
    <div class="col-md-3 mb-5 animate__animated animate__fadeIn" *ngFor="let movie of movies">

        <img [src]="movie.poster_path | poster" class="img-fluid poster" (click)="onMovieClick(movie)"
            alt="imagen pelicula">

        <div>
            <h3>{{ movie.title }}</h3>
            <div class="row">
                <div class="col-8 text-white">
                    <star-rating [starType]="'svg'" [rating]="movie.vote_average"></star-rating>

                </div>
                <div class="col-4 text-white">
                    {{ movie.vote_average | number:'1.1-2' }}
                </div>
            </div>
        </div>

    </div>
</div>
